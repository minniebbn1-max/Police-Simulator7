<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLICE LOCKER - ห้องแต่งตัว</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #04090f;
            color: #fff;
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-section {
            text-align: center;
            background: linear-gradient(180deg, #001f3f, #000);
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #00d4ff;
            margin-bottom: 25px;
        }

        .rank-badge {
            background: #ffcc00;
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            display: inline-block;
            margin-top: 10px;
        }

        .locker-grid {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .equip-card {
            background: #111;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .durability-tag {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
            padding: 2px 10px;
            border-bottom-left-radius: 10px;
            font-size: 10px;
            border-left: 1px solid #ffcc00;
            border-bottom: 1px solid #ffcc00;
            font-weight: bold;
        }

        .equip-info { display: flex; align-items: center; }
        .equip-icon { font-size: 30px; margin-right: 15px; }

        .btn-equip {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .btn-equip.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
            font-weight: bold;
        }

        .empty-msg { color: #555; text-align: center; margin-top: 50px; font-size: 14px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <button onclick="location.href='dashboard.html'" style="align-self: flex-start; background:none; border:none; color:#00d4ff; cursor:pointer; margin-bottom:10px;">⬅️ กลับศูนย์บัญชาการ</button>

    <div class="profile-section">
        <div style="font-size: 40px;">👤</div>
        <h2 style="margin: 10px 0 0 0;">เจ้าหน้าที่: PAO</h2>
        <div class="rank-badge">EXECUTIVE CEO</div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">รหัสประจำตัว: #1234</p>
    </div>

    <h3 style="margin-bottom: 15px;">อุปกรณ์ในคลังแสงส่วนตัว</h3>
    <div class="locker-grid" id="locker-list"></div>

    <script>
        function updateDressingRoomUI() {
            const container = document.getElementById('locker-list');
            const inventory = JSON.parse(localStorage.getItem('user_inventory')) || [];
            
            container.innerHTML = '';

            if (inventory.length === 0) {
                container.innerHTML = '<div class="empty-msg">ไม่มีอุปกรณ์ในครอบครอง<br>กรุณาไปซื้อที่คลังแสง</div>';
                return;
            }

            inventory.forEach((item, index) => {
                const currentAmount = item.durability || 0;
                // ถ้าของเหลือเยอะมากให้โชว์ Infinity
                const usesLeft = currentAmount >= 99999 ? "∞" : `${currentAmount}`;
                const isEquipped = item.status === 'equipped';
                
                let buttonHTML = '';
                if (currentAmount > 0) {
                    buttonHTML = `<button class="btn-equip ${isEquipped ? 'active' : ''}" onclick="toggleEquip(${index})">
                        ${isEquipped ? 'สวมใส่อยู่' : 'ติดตั้ง'}
                       </button>`;
                } else {
                    buttonHTML = `<button class="btn-equip" style="border-color:#ff4d4d; color:#ff4d4d;" disabled>ของหมด</button>`;
                }

                const card = document.createElement('div');
                card.className = 'equip-card';
                card.innerHTML = `
                    <div class="durability-tag">⏳ คงเหลือ: ${usesLeft}</div>
                    <div class="equip-info">
                        <span class="equip-icon">${getIconByName(item.name)}</span>
                        <span>${item.name}</span>
                    </div>
                    ${buttonHTML}
                `;
                container.appendChild(card);
            });
        }

        // เช็คไอคอนจากชื่อ เพื่อให้ครอบคลุมไอเทมใหม่ๆ
        function getIconByName(name) {
            if (name.includes("รถหุ้มเกราะ") || name.includes("Humvee")) return '🚔';
            if (name.includes("ดาวเทียม") || name.includes("Satellite")) return '🛰️';
            if (name.includes("เกราะ") || name.includes("Armor")) return '🛡️';
            if (name.includes("ปืน") || name.includes("Sig")) return '🔫';
            if (name.includes("โดรน") || name.includes("Drone")) return '🚁';
            if (name.includes("ระเบิด") || name.includes("Flashbang")) return '💥';
            return '📦';
        }

        function toggleEquip(index) {
            let inventory = JSON.parse(localStorage.getItem('user_inventory')) || [];
            
            // ถ้าอันที่จะกดมันติดตั้งอยู่แล้ว ให้ถอดออก (เป็นสถานะ active เฉยๆ)
            if (inventory[index].status === 'equipped') {
                inventory[index].status = 'active';
            } else {
                // บังคับถอดอันอื่นออกทั้งหมดก่อน เพื่อไม่ให้ใส่ของซ้ำซ้อน
                inventory.forEach(item => {
                    if (item.status === 'equipped') item.status = 'active';
                });
                // ติดตั้งอันที่เลือกใหม่
                inventory[index].status = 'equipped';
            }
            
            localStorage.setItem('user_inventory', JSON.stringify(inventory));
            updateDressingRoomUI(); 
        }

        window.onload = updateDressingRoomUI;
    </script>
</body>
</html>
