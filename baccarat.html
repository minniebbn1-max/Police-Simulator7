<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORC LUXURY - BACCARAT</title>
    <style>
        /* ใช้ CSS เดิมของท่านทั้งหมดเพื่อให้สวยงามเหมือนเดิม */
        * { box-sizing: border-box; }
        body { background-color: #0a0e14; color: #fff; font-family: 'Kanit', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .casino-header { width: 100%; max-width: 400px; background: linear-gradient(90deg, #d4af37, #f9e29c); color: #000; padding: 15px; text-align: center; font-weight: bold; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .stats-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; align-items: center; font-size: 14px; }
        .game-area { width: 100%; max-width: 400px; background: #0f172a; border: 2px solid #d4af37; border-radius: 20px; padding: 20px; text-align: center; position: relative; }
        .card-display { display: flex; justify-content: space-between; margin: 20px 0; gap: 10px; }
        .card-slot { width: 80px; height: 110px; position: relative; perspective: 1000px; opacity: 0; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(-150px); }
        .card-slot.reveal { opacity: 1; transform: translateY(0); }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 8px; border: 2px solid #334155; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card-front { background: #fff; color: #000; font-size: 28px; font-weight: bold; transform: rotateY(180deg); }
        .card-back { background: radial-gradient(circle, #8a0000, #4a0000); background-image: repeating-linear-gradient(45deg, rgba(255,215,0,0.1) 0px, rgba(255,215,0,0.1) 2px, transparent 2px, transparent 10px); border: 2px solid #d4af37; color: #d4af37; font-size: 18px; font-weight: bold; }
        .stats-board { width: 100%; max-width: 400px; background: #070b13; border: 1px solid #334155; border-radius: 10px; margin-top: 15px; padding: 10px; }
        .grid-container { display: flex; gap: 5px; height: 40px; overflow-x: auto; padding-bottom: 5px; }
        .stat-dot { width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
        .dot-p { background: #3b82f6; color: white; }
        .dot-b { background: #ef4444; color: white; }
        .dot-t { background: #22c55e; color: white; }
        input[type="number"] { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #d4af37; color: #fff; border-radius: 10px; text-align: center; font-size: 18px; margin-bottom: 15px; }
        .bet-buttons { display: flex; gap: 10px; }
        .btn-bet { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; color: #fff; }
        .btn-player { background: #3b82f6; box-shadow: 0 4px #1d4ed8; }
        .btn-banker { background: #ef4444; box-shadow: 0 4px #b91c1c; }
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="casino-header">🃏 BACCARAT ROOM 🃏</div>
    <div class="stats-bar">
        <span>💰 <span id="user-money" style="color:#00ff88;">0</span> ฿</span>
        <span id="timer-display" style="color:#ffcc00; font-weight:bold;">⏳ รอเดิมพัน</span>
    </div>
    <div class="game-area">
        <div class="card-display">
            <div>
                <div style="display:flex; gap:5px;">
                    <div class="card-slot" id="p-card-1"><div class="card-inner"><div class="card-back">ORC</div><div class="card-front"></div></div></div>
                    <div class="card-slot" id="p-card-2"><div class="card-inner"><div class="card-back">ORC</div><div class="card-front"></div></div></div>
                </div>
                <div style="color:#3b82f6; margin-top:5px;">PLAYER: <span id="p-score">0</span></div>
            </div>
            <div>
                <div style="display:flex; gap:5px;">
                    <div class="card-slot" id="b-card-1"><div class="card-inner"><div class="card-back">ORC</div><div class="card-front"></div></div></div>
                    <div class="card-slot" id="b-card-2"><div class="card-inner"><div class="card-back">ORC</div><div class="card-front"></div></div></div>
                </div>
                <div style="color:#ef4444; margin-top:5px;">BANKER: <span id="b-score">0</span></div>
            </div>
        </div>
        <input type="number" id="bet-amount" value="1000">
        <div class="bet-buttons">
            <button id="btn-left" class="btn-bet btn-player" onclick="placeBet('left')">PLAYER</button>
            <button id="btn-right" class="btn-bet btn-banker" onclick="placeBet('right')">BANKER</button>
        </div>
        <div class="stats-board"><div class="grid-container" id="stats-grid"></div></div>
    </div>
    <button onclick="location.href='lobby.html'" style="margin-top:20px; background:none; border:none; color:#888; cursor:pointer;">🔙 กลับไปหน้าเลือกห้อง</button>

    <div class="result-overlay" id="result-screen">
        <div id="res-title" style="font-size:45px; font-weight:bold;">WIN!</div>
        <div id="res-detail" style="margin-bottom:20px;"></div>
        <button class="btn-bet" style="background:#d4af37; color:#000; padding:10px 40px;" onclick="closeResult()">ถัดไป</button>
    </div>

    <script>
        // ใส่ Logic บาคาร่าที่ตัดส่วนเสือมังกรออก
        let deck = []; let timeLeft = 5; let timerId = null; let currentBetSide = null;
        function createDeck() {
            const suits = ['♠️', '♥️', '♣️', '♦️'];
            const values = [{n:'A', v:1}, {n:'2', v:2}, {n:'3', v:3}, {n:'4', v:4}, {n:'5', v:5}, {n:'6', v:6}, {n:'7', v:7}, {n:'8', v:8}, {n:'9', v:9}, {n:'10', v:0}, {n:'J', v:0}, {n:'Q', v:0}, {n:'K', v:0}];
            deck = []; for (let s of suits) { for (let v of values) { deck.push({ suit: s, name: v.n, value: v.v }); } }
            deck.sort(() => Math.random() - 0.5);
        }
        function updateUI() {
            let money = parseInt(localStorage.getItem('police_money')) || 0;
            document.getElementById('user-money').innerText = money.toLocaleString();
        }
        function startCountdown() {
            resetTable(); timeLeft = 5; currentBetSide = null;
            document.getElementById('btn-left').disabled = false; document.getElementById('btn-right').disabled = false;
            timerId = setInterval(() => {
                timeLeft--; document.getElementById('timer-display').innerText = `⏳ วางเดิมพัน: ${timeLeft}s`;
                if (timeLeft <= 0) { clearInterval(timerId); startDealing(); }
            }, 1000);
        }
        function placeBet(side) {
            let amount = parseInt(document.getElementById('bet-amount').value);
            let money = parseInt(localStorage.getItem('police_money')) || 0;
            if (amount > money) return alert("เงินไม่พอ!");
            currentBetSide = side; localStorage.setItem('police_money', money - amount); updateUI();
            document.getElementById('btn-left').disabled = true; document.getElementById('btn-right').disabled = true;
        }
        async function startDealing() {
            if (deck.length < 10) createDeck();
            let p1 = deck.pop(); let b1 = deck.pop(); let p2 = deck.pop(); let b2 = deck.pop();
            dropCard('p-card-1', p1); await sleep(200); dropCard('b-card-1', b1); await sleep(200);
            dropCard('p-card-2', p2); await sleep(200); dropCard('b-card-2', b2); await sleep(800);
            flip('p-card-1'); flip('b-card-1'); flip('p-card-2'); flip('b-card-2');
            setTimeout(() => {
                let pT = (p1.value + p2.value) % 10; let bT = (b1.value + b2.value) % 10;
                document.getElementById('p-score').innerText = pT; document.getElementById('b-score').innerText = bT;
                let win = (pT > bT && currentBetSide === 'left') || (bT > pT && currentBetSide === 'right');
                showResult(win, pT === bT, pT > bT ? 'P' : (bT > pT ? 'B' : 'T'));
            }, 800);
        }
        function dropCard(id, c) { const el = document.getElementById(id); el.querySelector('.card-front').innerHTML = c.suit + c.name; el.classList.add('reveal'); }
        function flip(id) { document.getElementById(id).querySelector('.card-inner').classList.add('is-flipped'); }
        function showResult(win, tie, res) {
            const screen = document.getElementById('result-screen'); screen.style.display = 'flex';
            let amount = parseInt(document.getElementById('bet-amount').value);
            if(tie) { document.getElementById('res-title').innerText = "TIE"; localStorage.setItem('police_money', (parseInt(localStorage.getItem('police_money')) || 0) + amount); }
            else if(win) { document.getElementById('res-title').innerText = "WIN!"; localStorage.setItem('police_money', (parseInt(localStorage.getItem('police_money')) || 0) + (amount * 2)); }
            else { document.getElementById('res-title').innerText = "LOST"; }
            const dot = document.createElement('div'); dot.className = `stat-dot dot-${res.toLowerCase()}`; dot.innerText = res; document.getElementById('stats-grid').appendChild(dot);
            updateUI();
        }
        function resetTable() { ['p-card-1', 'p-card-2', 'b-card-1', 'b-card-2'].forEach(id => { const el = document.getElementById(id); el.classList.remove('reveal'); el.querySelector('.card-inner').classList.remove('is-flipped'); }); document.getElementById('p-score').innerText = "0"; document.getElementById('b-score').innerText = "0"; }
        function closeResult() { document.getElementById('result-screen').style.display = 'none'; startCountdown(); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        createDeck(); updateUI(); startCountdown();
    </script>
</body>
</html>
