<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VELVET LOUNGE - VIP ONLY</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #050505; color: #fff; font-family: 'Kanit', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Header & Rank Section */
        .vip-profile {
            width: 100%; max-width: 450px; background: linear-gradient(145deg, #1a1a1a, #000);
            border: 1px solid #d4af37; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            text-align: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .rank-name { color: #d4af37; font-weight: bold; font-size: 22px; text-shadow: 0 0 10px #d4af37; }
        .progress-container { background: #222; height: 10px; border-radius: 5px; margin: 15px 0; position: relative; }
        .progress-bar { background: linear-gradient(90deg, #d4af37, #f9e29c); height: 100%; border-radius: 5px; transition: 1s; }
        
        /* Room & Lobby */
        .lobby-grid { width: 100%; max-width: 450px; display: grid; gap: 15px; }
        .room-card {
            background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .room-card:hover { border-color: #d4af37; background: #161616; }
        .online-dot { color: #00ff88; font-size: 12px; }

        #room-view { display: none; width: 100%; max-width: 500px; text-align: center; flex-direction: column; align-items: center;}
        .table-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .table { width: 80px; height: 80px; background: #222; border-radius: 50%; border: 2px solid #444; 
                  display: flex; align-items: center; justify-content: center; cursor: pointer; margin: auto;}
        .table.occupied { border-color: #d4af37; box-shadow: 0 0 15px #d4af37; color: #d4af37; }

        /* Gift Store Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 1000; }
        .gift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .gift-item { background: #1a1a1a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        
        .btn-gold { background: #d4af37; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.9); }

        /* --- Gift Feed Styling (เหมือนแอปหาคู่) --- */
        #gift-feed-container {
            position: fixed; bottom: 80px; left: 20px; z-index: 9999;
            display: flex; flex-direction: column-reverse; gap: 10px; pointer-events: none;
        }
        .gift-notice {
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid #d4af37;
            border-radius: 30px 10px 10px 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInLeft 0.4s ease-out, fadeOut 0.5s ease-in 4.5s forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 280px;
            backdrop-filter: blur(5px);
        }
        .gift-icon-box { font-size: 28px; filter: drop-shadow(0 0 5px gold); }
        .text-info { font-size: 14px; color: #fff; line-height: 1.4; }
        .user-name { color: #d4af37; font-weight: bold; font-size: 15px; }
        .reward-tag { color: #00ff88; font-size: 12px; font-weight: bold; }

        @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="gift-feed-container"></div>

<div class="container" id="lobby-view">
    <button onclick="location.href='dashboard.html'" style="color:#666; background:none; border:none; margin-bottom:20px; cursor:pointer;">[ ย้อนกลับ ]</button>
    <h2 style="color:#d4af37; letter-spacing: 3px;">THE VELVET LOUNGE</h2>
    
    <div class="vip-profile">
        <div id="user-rank-title" class="rank-name">SILVER MEMBER</div>
        <div class="progress-container">
            <div id="rank-progress" class="progress-bar" style="width: 0%"></div>
        </div>
        <div style="display:flex; justify-content: space-between; font-size: 12px; color:#888;">
            <span>ยอดเปย์สะสม: <span id="total-spent" style="color:#d4af37;">0</span> ฿</span>
            <span id="next-rank-text">เป้าหมาย: 3,000,000</span>
        </div>
    </div>

    <div class="lobby-grid">
        <div class="room-card" onclick="enterRoom('Diamond Suite')">
            <div><b>💎 Diamond Suite</b><br><span style="font-size:12px; color:#555;">เลาจน์ระดับสูงสุด</span></div>
            <div class="online-dot">● 12 คนออนไลน์</div>
        </div>
        <div class="room-card" onclick="enterRoom('Gold Terrace')">
            <div><b>🥂 Gold Terrace</b><br><span style="font-size:12px; color:#555;">ปาร์ตี้ริมระเบียง</span></div>
            <div class="online-dot">● 45 คนออนไลน์</div>
        </div>
        <div class="room-card" onclick="enterRoom('Black Box')">
            <div><b>🌑 Black Box</b><br><span style="font-size:12px; color:#555;">ห้องลับเฉพาะกิจ</span></div>
            <div class="online-dot" style="color:#ff4d4d;">● 8 คนออนไลน์</div>
        </div>
    </div>
</div>

<div class="container" id="room-view">
    <h3 id="current-room-name" style="color:#d4af37;">ROOM NAME</h3>
    <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:20px; width: 100%;">
        <p style="font-size:14px;">เลือกโต๊ะที่ว่างเพื่อเริ่มการเปย์</p>
        <div class="table-area">
            <div class="table" onclick="sitTable(this, 1)">1</div>
            <div class="table" onclick="sitTable(this, 2)">2</div>
            <div class="table occupied" onclick="alert('โต๊ะนี้มีคนนั่งแล้ว')">VIP</div>
            <div class="table" onclick="sitTable(this, 3)">3</div>
            <div class="table" onclick="sitTable(this, 4)">4</div>
            <div class="table" onclick="sitTable(this, 5)">5</div>
        </div>
    </div>
    <button class="btn-gold" onclick="openGiftStore()">🎁 ส่งของขวัญละลายทรัพย์</button>
    <br><br>
    <button onclick="exitRoom()" style="background:none; border:none; color:#666; cursor:pointer;">ออกจากห้อง</button>
</div>

<div class="modal" id="gift-modal">
    <div style="padding:20px; display:flex; justify-content: space-between; align-items: center;">
        <h3 style="color:#d4af37;">GIFT STORE (VIP ITEMS)</h3>
        <button onclick="closeGift()" style="color:#fff; background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <div class="gift-grid" id="gift-list"></div>
</div>

<script>
    let totalSpent = parseInt(localStorage.getItem('vip_spent')) || 0;
    let myMoney = parseInt(localStorage.getItem('police_money')) || 0;

    const ranks = [
        { name: "SILVER MEMBER", min: 0 },
        { name: "GOLDEN GUEST", min: 3000000 },
        { name: "PLATINUM ELITE", min: 10000000 },
        { name: "EMERALD PATRON", min: 50000000 },
        { name: "SAPPHIRE NOBLE", min: 150000000 },
        { name: "DIAMOND EMPEROR", min: 500000000 },
        { name: "PAO OVERLORD", min: 1000000000 }
    ];

    const gifts = [
        { name: "แชมเปญหรู", price: 50000, icon: "🍾" },
        { name: "ช่อดอกไม้ทองคำ", price: 150000, icon: "💐" },
        { name: "นาฬิกา Patek", price: 2500000, icon: "⌚" },
        { name: "แหวนเพชร 10 กะรัต", price: 5000000, icon: "💎" },
        { name: "รถ Supercar", price: 35000000, icon: "🏎️" },
        { name: "เกาะส่วนตัว", price: 250000000, icon: "🏝️" },
        { name: "เรือยอร์ชลำยักษ์", price: 600000000, icon: "🚢" },
        { name: "ตึกระฟ้า", price: 999999999, icon: "🏙️" }
    ];

    function updateRank() {
        let currentRank = ranks[0];
        let nextRank = ranks[1];
        for(let i=0; i<ranks.length; i++) {
            if(totalSpent >= ranks[i].min) {
                currentRank = ranks[i];
                nextRank = ranks[i+1] || currentRank;
            }
        }
        document.getElementById('user-rank-title').innerText = currentRank.name;
        document.getElementById('total-spent').innerText = totalSpent.toLocaleString();
        let percent = (nextRank !== currentRank) ? (totalSpent / nextRank.min) * 100 : 100;
        document.getElementById('next-rank-text').innerText = (nextRank !== currentRank) ? "เป้าหมาย: " + nextRank.min.toLocaleString() : "MAX RANK REACHED";
        document.getElementById('rank-progress').style.width = Math.min(percent, 100) + "%";
        
        localStorage.setItem('vip_spent', totalSpent);
        localStorage.setItem('police_money', myMoney);
    }

    function enterRoom(name) {
        document.getElementById('lobby-view').style.display = 'none';
        document.getElementById('room-view').style.display = 'flex';
        document.getElementById('current-room-name').innerText = name;
    }

    function exitRoom() {
        document.getElementById('lobby-view').style.display = 'flex';
        document.getElementById('room-view').style.display = 'none';
    }

    function sitTable(el, num) {
        document.querySelectorAll('.table').forEach(t => t.classList.remove('occupied'));
        el.classList.add('occupied');
    }

    function openGiftStore() {
        const list = document.getElementById('gift-list');
        list.innerHTML = '';
        gifts.forEach(g => {
            const div = document.createElement('div');
            div.className = 'gift-item';
            div.innerHTML = `
                <div style="font-size:30px;">${g.icon}</div>
                <div style="font-size:12px; margin:5px 0;">${g.name}</div>
                <div style="color:#d4af37; font-size:13px;">฿${g.price.toLocaleString()}</div>
                <button class="btn-gold" style="padding:5px 10px; font-size:10px; margin-top:10px;" onclick="buyGift('${g.name}', ${g.price}, '${g.icon}')">เปย์เลย</button>
            `;
            list.appendChild(div);
        });
        document.getElementById('gift-modal').style.display = 'block';
    }

    function buyGift(itemName, itemPrice, itemIcon) {
        if (myMoney < itemPrice) {
            alert("ยอดเงินไม่เพียงพอครับท่าน!");
            return;
        }

        // 1. กระบวนการหักเงิน
        myMoney -= itemPrice;
        totalSpent += itemPrice;

        // 2. ปิดหน้าต่างร้านค้าทันที
        closeGift();

        // 3. สร้างระบบ Feed แจ้งเตือนด้านล่าง (Gift Feed)
        const feedContainer = document.getElementById('gift-feed-container');
        const notice = document.createElement('div');
        notice.className = 'gift-notice';
        
        const prestige = Math.floor(itemPrice / 100);

        notice.innerHTML = `
            <div class="gift-icon-box">${itemIcon}</div>
            <div class="text-info">
                <span class="user-name">EXECUTIVE CEO PAO</span> <br>
                ส่งมอบ <span style="color:gold;">${itemName}</span>
                <div class="reward-tag">ได้รับบารมี VIP +${prestige.toLocaleString()} 💎</div>
            </div>
        `;

        feedContainer.appendChild(notice);

        // 4. อัปเดตข้อมูลบนหน้าจอทันที
        updateRank();

        // 5. ลบประกาศออกหลังจาก 5 วินาที
        setTimeout(() => { notice.remove(); }, 5000);
    }

    function closeGift() { document.getElementById('gift-modal').style.display = 'none'; }
    
    updateRank();
</script>
</body>
</html>
